name: Atualizar Curvas de Juros

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 09:00 BRT (UTC-3), segunda a sexta
  workflow_dispatch:           # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Rodar coletor
        run: python coletor_curvas_py.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico_curvas.csv dados.js
          git diff --staged --quiet && echo "Nada a commitar." || \
            git commit -m "dados: atualizar historicos - $(date +%Y-%m-%d)"
          git push
